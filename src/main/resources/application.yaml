spring:
  application:
    name: sazzler-product-service
  data:
    mongodb:
      uri: mongodb://localhost:27017/sazzler_db
  kafka:
    topic:
      name: sazzler-product-topic
      
#    the kafka broker address
    bootstrap-servers: localhost:9092
#    the broker adress and serializer and deserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: sazzler-product-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer





# Eureka client configuration


# Actuator configuration for monitoring

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus


server:
    port: 8083
eureka:
  instance:
    prefer-ip-address: true
  client:
    enabled: true
    service-url:
        defaultZone: http://amodhyh:1234@localhost:8761/eureka/
