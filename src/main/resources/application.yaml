spring:
  application:
    name: sazzler-product-service
  data:
    mongodb:
      uri: mongodb://localhost:27017/sazzler_db


# Eureka client configuration


# Actuator configuration for monitoring


management:
  tracing:
    enabled: false
  endpoint:
    web:
      exposure:
        include: health,info

server:
    port: 8083
eureka:
  instance:
    prefer-ip-address: true
  client:
    enabled: true
    service-url:
        defaultZone: http://amodhyh:1234@localhost:8761/eureka/
